  map_map:`
    <h2>Problem-to-solution map</h2>
    <p>Ten situations. Each represents a distinct enterprise conversation: a different buyer, a different organizational fear, a different entry motion. Why current tools miss it is in the middle column. Our entry is on the right.</p>
    <div class="callout callout-blue"><strong>This practice sits across all ten rows, not in any single product category.</strong> The map is organized as a progression: from what employees and developers are doing, through what agents and identity systems cannot govern, through what the SOC and compliance teams cannot see, to what the threat landscape looks like when attackers use the same AI. Read it once to build the mental model. Use it before meetings to locate the right conversation. <strong>Solid pills are established platforms. Dashed pills are emerging or candidate vendors.</strong></div>
    <div class="div"></div>
    <div class="map-wrap">
    <div class="map-hd"><div>Client situation</div><div>Why current tools miss it</div><div>Category</div><div>Vendors</div><div>Our entry</div></div>

    <div class="map-row">
      <div class="map-cell"><strong>Shadow AI and data exposure</strong><span class="map-buyer">Buyer: DLP lead · data security · CISO</span>Employees using AI tools outside IT visibility. Data leaving through channels security cannot see or govern.</div>
      <div class="map-cell">DLP was built to detect structured data in known channels: email, USB, monitored web proxies. It does not see unstructured text pasted into a chat window, credentials ingested by a desktop coding tool, or data an agent aggregates across five systems into a single context window. 71% of AI access happens through personal accounts that fall entirely outside the identity management system.</div>
      <div class="map-cell"><div class="map-cat">AI Data Security · Shadow AI Visibility · DSPM extension</div></div>
      <div class="map-cell"><div class="vpills"><span class="vp e">Microsoft Purview</span><span class="vp e">Netskope</span><span class="vp e">Zscaler</span><span class="vp e">Varonis</span><span class="vp e">Proofpoint</span><span class="vp e">Cyera</span><span class="vp e">Nightfall</span><span class="vp e">LayerX</span><span class="vp c">Aurascape</span><span class="vp c">WitnessAI</span><span class="vp c">Orion Security</span><span class="vp c">Opsin Security</span><span class="vp c">Ciphero</span><span class="vp c">Concentric AI</span></div></div>
      <div class="map-cell gp"><strong>AI Governance Services</strong>Policy, data classification, acceptable-use enforcement.</div>
    </div>

    <div class="map-row">
      <div class="map-cell"><strong>Developer tools and supply chain</strong><span class="map-buyer">Buyer: AppSec lead · engineering leadership</span>AI coding tools with direct access to codebases, APIs, secrets, and production environments, unreviewed at those permission levels.</div>
      <div class="map-cell">DSPM classifies data at rest. It does not see data entering an LLM context window. Supply chain review was designed to inspect what applications pull in. It has no inspection point for the tool layer above the dependency ecosystem. MCP servers and AI plugin marketplaces sit above the layer that AppSec was built to scan. Secrets leak at twice the human baseline rate through AI-assisted commits.</div>
      <div class="map-cell"><div class="map-cat">AI AppSec · Supply Chain Security · Secrets Detection · Developer Tooling Governance</div></div>
      <div class="map-cell"><div class="vpills"><span class="vp e">GitGuardian</span><span class="vp e">Semgrep</span><span class="vp e">Snyk</span><span class="vp e">Veracode</span><span class="vp e">Checkmarx</span><span class="vp e">HiddenLayer</span><span class="vp c">Pillar Security</span><span class="vp c">Noma</span></div></div>
      <div class="map-cell gp"><strong>AI Threat Modeling and Architecture Review</strong>Code assist attack surface, supply chain exposure, MCP server risk.</div>
    </div>

    <div class="map-row">
      <div class="map-cell"><strong>Identity governance for AI agents</strong><span class="map-buyer">Buyer: IAM/IGA lead · identity-owning CISO</span>Agents operating under cloned human accounts with no lifecycle management, no offboarding, and no accountability structure.</div>
      <div class="map-cell">IAM systems were built for human scale: one user, one session, one set of hands. Agents are a third identity class: human-level access breadth, machine speed and scale, no judgment and no accountability. The tooling offers no native category for them, so the default path is to clone a human profile and grant access. The system accepts the substitution because it classifies the credential, not the entity holding it. Agents inherit the full permission set with no offboarding process. Permission sprawl begins at deployment, not at breach.</div>
      <div class="map-cell"><div class="map-cat">IGA / IAM extended to agents · Non-Human Identity · Agent lifecycle management</div></div>
      <div class="map-cell"><div class="vpills"><span class="vp e">SailPoint</span><span class="vp e">Okta</span><span class="vp e">CyberArk</span><span class="vp e">Saviynt</span><span class="vp e">Cisco Duo</span><span class="vp e">MSFT Entra</span><span class="vp c">Zenity</span><span class="vp c">JetStream</span><span class="vp c">Noma</span><span class="vp c">Onyx Security</span></div></div>
      <div class="map-cell gp"><strong>AI Strategic and Advisory Services</strong>Agent identity model design, NHI governance framework, lifecycle policy.</div>
    </div>

    <div class="map-row">
      <div class="map-cell"><strong>Ungoverned autonomous agents</strong><span class="map-buyer">Buyer: CISO · security engineering · runtime governance</span>Agents authorized to act at machine speed with no behavioral governance, no kill switch, and no action-level enforcement.</div>
      <div class="map-cell">Valid identity plus authorized access no longer equals a safe outcome. Access control verifies that the identity can reach the resource. It does not govern what the identity does once inside. An agent executing hundreds of actions per minute with authorized access operates entirely within the authorized category while producing outcomes nobody intended. Per-request AI gateways inspect individual requests but cannot detect multi-step attack patterns that span sequences. The attack surface is the session, not the request.</div>
      <div class="map-cell"><div class="map-cat">AI Runtime Security · Agent behavioral monitoring · Action-level enforcement · Agentic governance</div></div>
      <div class="map-cell"><div class="vpills"><span class="vp e">CrowdStrike</span><span class="vp e">SentinelOne</span><span class="vp e">Cisco</span><span class="vp e">Upwind</span><span class="vp e">HiddenLayer</span><span class="vp c">Zenity</span><span class="vp c">Noma</span><span class="vp c">JetStream</span><span class="vp c">Capsule Security</span><span class="vp c">Straiker</span><span class="vp c">Eve</span><span class="vp c">Sweet Security</span><span class="vp c">Onyx Security</span></div></div>
      <div class="map-cell gp"><strong>AI Strategic and Advisory Services</strong>Agent inventory, autonomy threshold design, runtime enforcement architecture.</div>
    </div>

    <div class="map-row map-row-stage3">
      <div class="map-cell"><strong>SOC and incident response gaps</strong><span class="map-buyer">Buyer: SOC lead · IR-owning CISO</span>Agent actions indistinguishable from human activity in default logging. No agentic IR playbooks. No behavioral baselines for deployed agents.</div>
      <div class="map-cell">In default SIEM configurations, agent-initiated actions appear as human-initiated actions. Distinguishing the two requires process-tree analysis, tracing whether a browser session was launched by a human or spawned by an agent, and that most enterprise logging pipelines are not configured to capture. When an agent is involved in a security event, IR teams have no defined playbook and no behavioral baseline to compare against. The attribution gap means the incident cannot be reconstructed and the blast radius cannot be confirmed.</div>
      <div class="map-cell"><div class="map-cat">Agentic behavioral telemetry · AI-native SOC · Agentic IR playbooks · Agent attribution</div></div>
      <div class="map-cell"><div class="vpills"><span class="vp e">CrowdStrike</span><span class="vp e">Splunk</span><span class="vp e">Elastic</span><span class="vp e">Datadog Security</span><span class="vp e">MSFT Sentinel</span><span class="vp c">Vega</span><span class="vp c">Artemis</span><span class="vp c">Prophet Security</span><span class="vp c">7AI</span><span class="vp c">Kai Security</span><span class="vp c">Fig Security</span><span class="vp c">Surf.AI</span></div></div>
      <div class="map-cell gp"><strong>AI Strategic and Advisory Services</strong>Agentic IR playbook design, behavioral baseline establishment, SOC tooling assessment.</div>
    </div>

    <div class="map-row">
      <div class="map-cell"><strong>Resilience, recovery, and data lineage for AI</strong><span class="map-buyer">Buyer: data resilience lead · backup-owning CISO · data governance</span>Recovery posture for AI-driven actions, integrity verification for training data and context windows, and data lineage for what agents actually moved.</div>
      <div class="map-cell">Backup programs were built around human-speed destructive events and known data flows. Agents break both assumptions. PocketOS took nine seconds to delete a production database and its backups; restoration took two days. The asymmetry between destruction speed and recovery speed widens as agents take more action. Recovery without integrity verification is a second problem: when training data or a context window has been corrupted, restoring to a prior state may restore the corruption. Data lineage for AI is a third: agents aggregate data across systems into context windows that no traditional lineage tool follows. The OWASP GenAI 2026 framework treats lineage, provenance, AI-BOM, and rollback validation as distinct requirements. Most enterprises do not have a function that owns the intersection of backup, data governance, and AI workflow integrity.</div>
      <div class="map-cell"><div class="map-cat">AI data resilience · Recovery posture · Data lineage and provenance · Model and training-data integrity</div></div>
      <div class="map-cell"><div class="vpills"><span class="vp e">Rubrik</span><span class="vp e">Cohesity</span><span class="vp e">Commvault</span><span class="vp e">Cyera</span><span class="vp e">HiddenLayer</span><span class="vp c">Protect AI</span><span class="vp c">Lakera</span><span class="vp c">Pillar Security</span><span class="vp c">Lasso Security</span><span class="vp c">Noma</span><span class="vp c">Salt Security</span></div></div>
      <div class="map-cell gp"><strong>AI Strategic and Advisory Services</strong>AI recovery posture assessment, data lineage architecture for AI workflows, integrity verification design.</div>
    </div>

    <div class="map-row">

      <div class="map-cell">Control attestation assumes the thing being governed changes slowly enough that a human can periodically verify it and a snapshot can accurately represent its state. Vanta, Drata, and OneTrust were built for that world: a control exists, someone attests to it, the auditor accepts the attestation. Agentic AI makes continuous probabilistic decisions. There is no meaningful snapshot. More critically, the standard audit catalogs, SOC 2, ISO 27001, PCI DSS, contain no controls mapped to agent identities. When an auditor encounters agents in production today, they improvise by asking which human-identity controls apply. That improvisation produces findings, not coverage. EU AI Act, ISO 42001, and NIST AI RMF require continuous operational evidence of AI behavior. The attestation model is architecturally mismatched to that requirement, not merely slow. Wharton researchers call this pattern cognitive surrender: accepting model output or system state without applying independent judgment. The attestation model institutionalizes it.</div>

function buildGlobalNav() {
  const items = [
    {k:null,      label:'⌂ Home'},
    {k:'full',    label:'🧠 Full picture'},
    {k:'credible',label:'🎯 Get the meeting'},
    {k:'map',     label:'🗺️ Show me the map'},
    {k:'mythos',  label:'⚠ Mythos',    cls:'gn-mythos'},
    {k:'fieldcard',label:'⚡ Field Card', cls:'gn-fcc'},
    {k:'glossary', label:'📖 Glossary',  cls:'gn-glossary'}
  ];
  return '<div class="global-nav">' + items.map(it => {
    const isActive = repType === it.k ? ' gn-active' : '';
    const extra = it.cls ? ' ' + it.cls : '';
    const onclick = it.k === null ? `goHome()` : `setGlobal('${it.k}')`;
    return `<button class="gn-btn${extra}${isActive}" onclick="${onclick}">${it.label}</button>`;
  }).join('') + '</div>';
}

function renderFieldCard() {
  return buildGlobalNav() + `
    <div class="eyebrow" style="color:#0d9488;">Field tool reference</div>
    <h1>⚡ Field Conversation Card</h1>
    <p style="color:#8fa3bd;font-size:15px;margin-bottom:20px;">The Field Conversation Card is a separate HTML tool: seven tabs, used before and during client meetings. This guide is the training layer. The Card is the day-of field layer. They are designed to work together.</p>

    <h2>Which tab to open, and when</h2>
    <div class="svc-grid">
      <div class="svc-row"><div class="svc-name">The Arc</div><div class="svc-desc">Open this first. Every time. The morning of any meeting. It contains the five-move arc language written out, the Move 3 pause instruction, and the Move 5 close. If you read nothing else, read this tab.</div></div>
      <div class="svc-row"><div class="svc-name">Stories</div><div class="svc-desc">Open before you decide which observation to lead with. The full peer observation library, organized by trigger. One observation per meeting. Know your anchor incident before you walk in.</div></div>
      <div class="svc-row"><div class="svc-name">When It Stalls</div><div class="svc-desc">Open if the conversation loses momentum or a client deflects. Stall responses organized by deflection type. Do not memorize them; just know they are there so you are not improvising under pressure.</div></div>
      <div class="svc-row"><div class="svc-name">Solution Landscape</div><div class="svc-desc">Open when the conversation moves toward solution space. The vendor map from this guide, with additional vendor context. Use it when a client names a vendor or asks what the category looks like.</div></div>
      <div class="svc-row"><div class="svc-name">First Engagement</div><div class="svc-desc">Open when you are ready to close for a next step. The prioritization working session offer, the exact language, and what to do if they say not yet.</div></div>
      <div class="svc-row"><div class="svc-name">Leave Behinds</div><div class="svc-desc">Open after the meeting. One page the client keeps. Sent within 24 hours. Contains the observation you led with, one diagnostic question they named as relevant, and the proposed next step.</div></div>
      <div class="svc-row"><div class="svc-name">Read the Room</div><div class="svc-desc">Open when you are unsure who you are meeting with or what they care about. Persona signals, what each persona needs to hear first, and what to avoid with each one.</div></div>
    </div>

    <div class="callout callout-teal"><strong>The three-tool sequence:</strong> This guide builds your understanding. The Conversation Builder translates that understanding into a meeting-specific plan. The Field Conversation Card supports the meeting in real time. They are not interchangeable; each serves a different moment.</div>`;
}

function renderGlossary() {
  return buildGlobalNav() + `
    <div class="eyebrow" style="color:#f59e0b;">Reference</div>
    <h1>AI Terms to Know</h1>
    <p style="color:#8fa3bd;font-size:15px;margin-bottom:24px;max-width:640px;">The field has a vocabulary problem. Vendors, researchers, and clients use the same words to mean different things. A rep who can define terms precisely, and correct misuse without being pedantic about it, earns credibility fast. These are the terms that matter in live client conversations.</p>

    <div class="gloss-section">Models and architecture</div>
    <div class="gloss-grid">
      <div class="gloss-row">
        <div class="gloss-term">Frontier model<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">A model at the leading edge of capability for its generation, trained on massive datasets, requiring significant compute, and capable of tasks no prior model could perform reliably. Examples: GPT-4o, Claude Opus, Gemini Ultra. The term implies current state-of-the-art, not a fixed threshold. What counts as frontier shifts as the field advances.<div class="gloss-note"><strong>In conversation:</strong> Clients use "frontier model" loosely to mean "powerful AI." The relevant distinction is that frontier models are the ones being applied to offensive security research, including vulnerability discovery and exploit development. That is what makes Mythos and similar programs significant.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Foundation model<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">A large model trained on broad data that serves as a base for many downstream applications. Foundation models are not task-specific. They are adapted via fine-tuning or prompting for specific use cases. GPT-4, Claude, and Gemini are all foundation models. Most enterprise AI applications are built on top of one.<div class="gloss-note"><strong>In conversation:</strong> When a client says "we are building an AI application," they almost certainly mean they are building on top of a foundation model via API. Their security exposure is partly a function of what that foundation model can do and what data it can reach.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Large language model (LLM)<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">A neural network trained on large volumes of text to predict and generate language. LLMs are the underlying architecture for most modern AI assistants, coding tools, and agents. The "large" refers to parameter count, typically billions to trillions of parameters. They are probabilistic, not deterministic: the same prompt can produce different outputs.<div class="gloss-note"><strong>In conversation:</strong> The probabilistic nature is why traditional AppSec, which assumes deterministic inputs and outputs, does not transfer cleanly to LLM-based applications. That gap is the technical foundation for the AI application security conversation.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Model weights<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">The numerical parameters learned during training that define how a model responds to inputs. Weights encode the model's "knowledge." They are stored as files, often in formats like safetensors or, historically, pickle files. A trained model is essentially its weights.<div class="gloss-note"><strong>In conversation:</strong> Pickle files are executable. A compromised model artifact can run arbitrary code when loaded. This is why model supply chain security is distinct from software supply chain security. The artifact is not just data; loading it is an execution event.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Fine-tuning<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">Additional training applied to a foundation model to adapt it for a specific task or domain, using a smaller, curated dataset. Fine-tuning adjusts the model's weights. It is distinct from prompting. Fine-tuning changes the model itself, not just how it is instructed.<div class="gloss-note"><strong>In conversation:</strong> Enterprises fine-tuning models on proprietary data have a supply chain exposure: the training data, the training pipeline, and the resulting model artifact are all attack surfaces. Most do not govern these as carefully as production code.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Inference<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">The process of running a trained model to generate outputs. When a user sends a prompt and receives a response, that is inference. Distinct from training, which is when the model learns from data. Most enterprise AI usage is inference against an externally hosted model via API.<div class="gloss-note"><strong>In conversation:</strong> Inference is where most of the runtime security exposure lives: what data enters the model context, what the model does with it, what it outputs, and what actions it takes. This is the layer per-request inspection tools monitor.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Embeddings<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">Numerical representations of text, images, or other data that encode semantic meaning in a vector space. Similar concepts cluster together in embedding space. Used extensively in RAG systems to find relevant documents. Once data is embedded, its original form is not directly recoverable, but its semantic content is preserved and searchable.<div class="gloss-note"><strong>In conversation:</strong> Embeddings create hidden exposure paths. Sensitive data embedded into a vector database for a RAG application is semantically accessible to anyone who can query that database, even if the source documents were access-controlled.</div></div>
      </div>
    </div>

    <div class="gloss-section">Agents and agentic systems</div>
    <div class="gloss-grid">
      <div class="gloss-row">
        <div class="gloss-term">Agent / Agentic AI<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">An AI system that perceives its environment, makes decisions, takes actions, and pursues goals over multiple steps without requiring human input at each step. Agents use tools, web search, code execution, API calls, file access, to accomplish tasks. The key distinction from a chatbot: an agent acts, not just responds.<div class="gloss-note"><strong>In conversation:</strong> The moment AI can take actions, the security model changes. Access control governs what the agent can reach. It does not govern what the agent chooses to do once inside. That gap is where authorized failure lives.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Multi-agent system<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">A system where multiple AI agents interact, coordinate, or delegate tasks to each other. One agent may orchestrate others, or agents may operate in parallel on different parts of a problem. Multi-agent architectures amplify both capability and risk. An action taken by a sub-agent may not be visible to the oversight layer monitoring the orchestrator.<div class="gloss-note"><strong>In conversation:</strong> Most governance tools monitor at the orchestrator level. Sub-agent actions can occur outside that visibility. Session-level detection becomes more important, not less, as systems become multi-agent.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Context window<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">The maximum amount of text (measured in tokens) a model can process in a single interaction. Everything the model can "see" and reason about must fit within this window: the conversation history, retrieved documents, tool outputs, and the current prompt. Modern frontier models have context windows ranging from 128K to over 1M tokens.<div class="gloss-note"><strong>In conversation:</strong> The context window is where data boundaries collapse. An agent that aggregates information across five systems places all of it into a single context window. Whatever classification controls existed on the source systems no longer apply once the data is in that shared space.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Tool use / Function calling<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">The ability of a model to invoke external tools, APIs, databases, code interpreters, file systems, as part of generating a response. The model decides which tool to call, with what arguments, and how to incorporate the result. Tool use is what makes agents capable of taking real-world actions.<div class="gloss-note"><strong>In conversation:</strong> Each tool the agent can call is an attack surface. A tool that can write to a database, send an email, or execute code extends the agent's blast radius to the full permission scope of those tools. Autonomy thresholds should be calibrated at the tool level, not just the agent level.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Orchestration<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">The coordination layer that manages how agents, tools, memory, and sub-agents interact to complete a task. Orchestration frameworks, LangGraph, CrewAI, Semantic Kernel, provide the plumbing that connects model calls to tool executions and manages state across multi-step workflows.<div class="gloss-note"><strong>In conversation:</strong> Orchestration layers are governance blind spots. Most security tools monitor at the network or endpoint level. The orchestration layer sits above both and coordinates actions that individually look authorized but collectively produce outcomes nobody intended.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Autonomy threshold<span class="gloss-tag">Governance concept</span></div>
        <div class="gloss-val">A defined boundary for what an agent is permitted to do without human approval. Below the threshold: the agent acts. Above it: the agent must pause for human review. Thresholds can be set by action type, impact level, data sensitivity, or resource scope. Analogous to transaction approval limits in financial controls.<div class="gloss-note"><strong>In conversation:</strong> Most enterprises deploying agents have not defined autonomy thresholds. The agent operates with unlimited autonomous authority within its permission scope. That is what the CrowdStrike Fortune 50 incident illustrates: every access control worked. No threshold governed what the agent chose to do with that access.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Non-human identity (NHI)<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">An identity credential assigned to a machine, service, or agent rather than a human user. Includes API keys, service accounts, OAuth tokens, and agent credentials. NHIs outnumber human identities in most enterprises and are governed far less rigorously: no MFA, no behavioral baseline, no offboarding process.<div class="gloss-note"><strong>In conversation:</strong> When an agent is deployed using a cloned human account, the NHI governance gap is worst-case. The agent inherits the human's full permission set. There is no mechanism to scope it down, no lifecycle management, and no way to offboard it when the agent is retired. IBM found 97% of AI-related breaches involved insufficient AI access controls. This is the structural reason why.</div></div>
      </div>
    </div>

    <div class="gloss-section">Protocols and infrastructure</div>
    <div class="gloss-grid">
      <div class="gloss-row">
        <div class="gloss-term">MCP (Model Context Protocol)<span class="gloss-tag">Core concept</span></div>
        <div class="gloss-val">An open protocol developed by Anthropic that standardizes how AI models connect to external tools, data sources, and services. MCP defines a client-server architecture: the AI model is the client, MCP servers expose capabilities (file access, API calls, database queries), and the model decides which server to invoke. Rapidly adopted across AI coding tools and agent frameworks.<div class="gloss-note"><strong>In conversation:</strong> SANDWORM_MODE exploited MCP directly: 19 malicious npm packages installed rogue MCP servers into Claude Code, Cursor, and Windsurf. The agent used the rogue server as designed, harvesting API keys in the process. MCP servers are now a documented initial access vector. Most AppSec programs have no inspection point for this layer.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">RAG (Retrieval-Augmented Generation)<span class="gloss-tag">Architecture</span></div>
        <div class="gloss-val">A technique that extends what a model knows by retrieving relevant documents from a knowledge base and including them in the context window before generating a response. The model does not memorize the documents. It reads them fresh for each query. Used widely to give models access to current, proprietary, or domain-specific information.<div class="gloss-note"><strong>In conversation:</strong> RAG systems pull from knowledge bases that are often unclassified or inadequately scoped. A RAG system connected to an internal wiki, code repository, or SharePoint site may surface documents the querying user was never meant to access directly, because the retrieval step does not apply the same access controls as the source system.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">SLSA provenance<span class="gloss-tag">Supply chain</span></div>
        <div class="gloss-val">Supply-chain Levels for Software Artifacts: a framework for verifying that a software artifact was built from a known source through an auditable process. SLSA provenance attestation is a cryptographic record that an artifact came from a specific build pipeline. Increasingly treated as a trust signal for software supply chain integrity.<div class="gloss-note"><strong>In conversation:</strong> Mini Shai-Hulud broke this assumption directly. UNC6780 published the first malicious npm package with valid SLSA provenance attestation. The control enterprises were told to trust for supply chain integrity had been defeated. If a client cites SLSA as their supply chain defense for AI tooling, this is the precise counter.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">AI SBOM / Model card<span class="gloss-tag">Governance concept</span></div>
        <div class="gloss-val">Software Bill of Materials applied to AI: a structured record of what a model is, what data it was trained on, what its intended use is, and what its known limitations are. Model cards are the informal version; AI SBOMs are the structured, machine-readable version being formalized in frameworks like the EU AI Act and NIST AI RMF.<div class="gloss-note"><strong>In conversation:</strong> Most enterprises deploying AI applications cannot produce an AI SBOM on request. When an auditor asks what model is running, what version, trained on what data, the answer is usually "we are using the API, we are not sure." That is a compliance gap that will matter as AI governance frameworks mature.</div></div>
      </div>
    </div>

    <div class="gloss-section">Threats and attacks</div>
    <div class="gloss-grid">
      <div class="gloss-row">
        <div class="gloss-term">Prompt injection<span class="gloss-tag">Attack class</span></div>
        <div class="gloss-val">An attack where malicious instructions are embedded in content the model processes, causing it to follow the attacker's instructions instead of the legitimate user's. Direct injection: the user themselves sends malicious instructions. Indirect injection: the malicious instructions are hidden in external content the agent reads: a document, email, web page, or shared file.<div class="gloss-note"><strong>In conversation:</strong> Indirect prompt injection is the harder problem. The victim is completely outside the interaction loop. The malicious instruction is in the data the agent reads, not in anything the user typed. Most clients have not connected this to their detection architecture. A SIEM monitoring user input does not see content the agent retrieves from external sources.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Guardrails<span class="gloss-tag">Defense concept</span></div>
        <div class="gloss-val">Controls applied to an AI model or application to restrict its behavior: preventing certain outputs, filtering inputs, blocking categories of content. Guardrails can be built into the model (training-time) or applied as a wrapper (runtime). Per-request inspection tools and content filters are the most common form.<div class="gloss-note"><strong>In conversation:</strong> When a client says "we already have guardrails," ask whether they operate at the request level or the session level. Per-request guardrails miss multi-step attacks like ForcedLeak and Pandora's Claw because no single step looks malicious. Session-level detection is architecturally different and far less common. The distinction between having guardrails and having sufficient guardrails is the conversation.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Hallucination<span class="gloss-tag">Model behavior</span></div>
        <div class="gloss-val">When a model generates plausible-sounding but factually incorrect content with apparent confidence. Hallucinations occur because models predict likely token sequences. They do not "know" facts in the way a database retrieves them. Rate and severity vary by model, domain, and task type.<div class="gloss-note"><strong>In conversation:</strong> Hallucination is a reliability and liability issue, not primarily a security issue, though it becomes security-relevant when an agent acts on a hallucinated API endpoint, credential, or instruction. The more consequential the action the agent can take, the more serious an hallucination-induced action becomes.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Goal drift<span class="gloss-tag">Attack / behavior</span></div>
        <div class="gloss-val">When an agent's pursued objective deviates from its original specification over a multi-step task, either through accumulated context misinterpretation, manipulation via injected content, or the agent finding a path to its goal that its designers did not anticipate. The Fortune 50 agent that rewrote its own security policy is a documented example.<div class="gloss-note"><strong>In conversation:</strong> Goal drift is why per-request inspection is insufficient. Each individual action may appear authorized. The drift is only visible at the session or task level, in the sequence of decisions, not any single decision. Behavioral baselines across the full agent session are the only detection surface for this class of threat.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Jailbreak<span class="gloss-tag">Attack class</span></div>
        <div class="gloss-val">An attempt to bypass a model's safety constraints by crafting inputs that cause it to produce outputs it was trained to refuse. Jailbreaks exploit the probabilistic nature of model outputs. A sufficiently unusual prompt can cause the model to follow instructions it would otherwise decline.<div class="gloss-note"><strong>In conversation:</strong> Jailbreak detection is a real product category that addresses a real problem. It is not foundational governance. A model that cannot be jailbroken still has access control gaps, identity governance gaps, and supply chain exposure. Calibrate it as a useful control, not a primary defense.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Shadow AI<span class="gloss-tag">Risk category</span></div>
        <div class="gloss-val">AI tools and applications used within an organization without IT or security awareness, approval, or governance. Analogous to shadow IT, but with higher data exposure risk because AI tools are specifically designed to ingest and process content. Most shadow AI involves employees using consumer AI tools for work tasks.<div class="gloss-note"><strong>In conversation:</strong> 51% of employees have connected unauthorized AI tools to work systems. 71.6% of generative AI access happens through personal accounts outside identity management. Shadow AI is not an edge case. It is the median state of enterprise AI adoption. The CISA director incident is the sharpest illustration: the highest-consequence possible user did it.</div></div>
      </div>
    </div>

    <div class="gloss-section">Governance and compliance</div>
    <div class="gloss-grid">
      <div class="gloss-row">
        <div class="gloss-term">Alignment<span class="gloss-tag">Safety concept</span></div>
        <div class="gloss-val">The research and engineering problem of ensuring AI systems pursue the goals their designers intend, especially as systems become more capable and autonomous. An "aligned" model does what its developers want. Misaligned behavior ranges from subtle (pursuing a proxy goal instead of the real one) to severe (pursuing goals actively harmful to users).<div class="gloss-note"><strong>In conversation:</strong> Alignment is often presented as a research-only concern. It is operational for enterprises deploying agentic AI now. The Fortune 50 agent that rewrote its own security policy was not misaligned in the theoretical sense. It pursued its goal efficiently. The problem was that nobody had specified the full set of constraints. That is an alignment failure at the deployment level, not the model level.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">Blast radius<span class="gloss-tag">Governance concept</span></div>
        <div class="gloss-val">The maximum scope of damage an agent can cause if it malfunctions, is compromised, or takes an unintended action. Determined by the agent's permissions, the systems it can reach, and the actions it can take. Minimizing blast radius is the agent equivalent of least privilege.<div class="gloss-note"><strong>In conversation:</strong> Executives understand blast radius intuitively from other domains: segregation of duties, approval workflows, transaction limits. The concept transfers directly to AI. The question that surfaces the gap: "If your most widely deployed agent took the worst action it is technically capable of, what is the maximum business impact?" Most clients cannot answer it.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">RLHF (Reinforcement Learning from Human Feedback)<span class="gloss-tag">Training method</span></div>
        <div class="gloss-val">A training technique where human raters evaluate model outputs and those ratings are used to fine-tune the model toward preferred behavior. RLHF is widely used to make models more helpful, harmless, and honest. It is one of the primary methods for building safety properties into frontier models.<div class="gloss-note"><strong>In conversation:</strong> RLHF produces safety properties at the model level. Enterprise agents inheriting those properties still lack operational governance: access controls, audit trails, autonomy thresholds, accountability owners. Model-level safety and deployment-level governance are separate problems. A model trained with RLHF can still be an agent that rewrites its own security policy.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">EU AI Act<span class="gloss-tag">Regulation</span></div>
        <div class="gloss-val">The European Union's comprehensive AI regulation, in force from August 2024 with phased compliance deadlines through 2027. Creates a risk-based classification system: unacceptable risk (banned), high risk (strict requirements), limited risk (transparency obligations), minimal risk (no requirements). High-risk AI includes systems used in critical infrastructure, employment, education, law enforcement, and biometrics.<div class="gloss-note"><strong>In conversation:</strong> The EU AI Act requires continuous operational evidence of AI behavior: logs, monitoring, human oversight mechanisms, not a one-time compliance letter. Most GRC platforms built on periodic attestation cannot produce this evidence. That is the architectural gap that the pipeline conversation opens.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">ISO/IEC 42001<span class="gloss-tag">Regulation</span></div>
        <div class="gloss-val">The first international standard for AI management systems, published in 2023. Provides a framework for organizations to establish, implement, maintain, and continually improve an AI management system. Structured similarly to ISO 27001: a certifiable management system standard with requirements for policy, risk assessment, controls, and performance evaluation.<div class="gloss-note"><strong>In conversation:</strong> ISO 42001 requires lifecycle risk management for AI systems, not a point-in-time assessment. Like the EU AI Act, it requires continuous evidence the current compliance automation stack was not designed to produce. Organizations beginning ISO 42001 programs have an open architecture decision, and the current GRC platform is usually the wrong substrate for it.</div></div>
      </div>
      <div class="gloss-row">
        <div class="gloss-term">NIST AI RMF<span class="gloss-tag">Regulation</span></div>
        <div class="gloss-val">The National Institute of Standards and Technology AI Risk Management Framework, published January 2023. Voluntary framework organized around four functions: Govern, Map, Measure, Manage. Designed to help organizations identify, assess, and manage AI risk across the AI lifecycle. Widely referenced in U.S. government procurement and increasingly in private sector AI governance programs.<div class="gloss-note"><strong>In conversation:</strong> NIST AI RMF names continuous monitoring as a first-class function under Measure and Manage. This is the regulatory grounding for the GRCDevSecOps argument: regulators are not asking for annual attestation of AI behavior. They are asking for ongoing operational evidence. The framework language supports the architectural case.</div></div>
      </div>
    </div>

    <div class="callout callout-muted" style="margin-top:8px;">These definitions are written for conversation use, not academic precision. The goal is to be accurate enough to use terms correctly in client meetings and to catch when clients or vendors are using them loosely in ways that matter to the security conversation.</div>`;
}

function renderApp() {
  const app = document.getElementById('app');
  if (!repType)              { app.innerHTML = renderLanding();  return; }
  if (repType === 'mythos')  { app.innerHTML = renderMythos();   return; }
  if (repType === 'fieldcard'){ app.innerHTML = renderFieldCard(); return; }
  if (repType === 'glossary') { app.innerHTML = renderGlossary(); return; }
  app.innerHTML = renderPath();
}

function pickRep(k)     { repType = k; chapter = 0; renderApp(); }
function setGlobal(k)   { repType = k; chapter = 0; renderApp(); window.scrollTo(0,0); }
function setChapter(i)  { chapter = i; renderApp(); window.scrollTo(0,0); }
function goHome()       { repType = null; chapter = 0; renderApp(); }

renderApp();
</script>
</body>
</html>
