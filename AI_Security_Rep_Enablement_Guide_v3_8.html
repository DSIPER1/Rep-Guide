<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Security Rep Enablement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1b2d;color:#f0f4f8;min-height:100vh;padding:32px 20px 80px;}
.wrap{max-width:960px;margin:0 auto;}

/* ── typography ── */
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#378ADD;margin-bottom:6px;}
h1{font-size:30px;font-weight:700;line-height:1.25;margin-bottom:8px;}
.sub{font-size:15px;color:#8fa3bd;line-height:1.65;margin-bottom:28px;max-width:560px;}
h2{font-size:18px;font-weight:600;margin-bottom:10px;line-height:1.35;}
h3{font-size:15px;font-weight:600;margin-bottom:6px;}
p{font-size:15px;color:#8fa3bd;line-height:1.75;margin-bottom:12px;}
p strong{color:#f0f4f8;font-weight:500;}

/* ── landing — rep picker ── */
.rep-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px;}
.rep-card{padding:24px 18px 20px;border:0.5px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.02);cursor:pointer;transition:border-color .15s,background .15s,transform .12s;-webkit-user-select:none;user-select:none;}
.rep-card:hover{background:rgba(55,138,221,.05);border-color:rgba(55,138,221,.28);transform:translateY(-2px);}
.rep-icon{font-size:22px;margin-bottom:12px;line-height:1;}
.rep-name{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.35;}
.rep-quote{font-size:13px;color:#4e6a88;line-height:1.55;font-style:italic;margin-bottom:8px;}
.rep-pill{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
.pill-a{background:rgba(55,138,221,.15);color:#7bb3ff;}
.pill-b{background:rgba(217,119,6,.12);color:#fbbf24;}
.pill-c{background:rgba(13,148,136,.13);color:#5eead4;}
.landing-footer{font-size:12px;color:#2a4a68;padding-top:16px;border-top:0.5px solid rgba(255,255,255,.05);}
.last-updated{font-size:12px;font-weight:500;color:#378ADD;margin-bottom:20px;letter-spacing:.01em;}

/* ── back bar ── */
.back-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
.back-btn{background:none;border:none;font-size:14px;color:#4e6a88;cursor:pointer;font-family:inherit;padding:0;}
.back-btn:hover{color:#8fa3bd;}
.back-sep{color:#1e3a5f;font-size:13px;}
.back-crumb{font-size:14px;color:#378ADD;}

/* ── chapter nav ── */
.chapter-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px;}
.ch-btn{background:none;border:0.5px solid rgba(255,255,255,.08);border-radius:5px;font-size:13px;font-weight:500;color:#4e6a88;padding:5px 12px;cursor:pointer;font-family:inherit;transition:border-color .12s,color .12s,background .12s;}
.ch-btn:hover{color:#8fa3bd;border-color:rgba(255,255,255,.16);}
.ch-btn.active{border-color:#378ADD;color:#f0f4f8;background:rgba(55,138,221,.08);}

/* ── content sections ── */
.section{display:none;}
.section.visible{display:block;}

/* ── cards ── */
.card{border:0.5px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.card-h{padding:10px 14px;background:rgba(255,255,255,.03);border-bottom:0.5px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;}
.card-n{font-size:11px;color:#378ADD;font-family:monospace;}
.card-l{font-size:14px;font-weight:600;}
.card-b{padding:14px 15px;}

/* ── callout boxes ── */
.callout{padding:12px 14px;border-radius:6px;font-size:15px;line-height:1.7;margin-bottom:10px;}
.callout-blue{background:rgba(55,138,221,.07);border:0.5px solid rgba(55,138,221,.18);color:#f0f4f8;}
.callout-amber{background:rgba(217,119,6,.07);border:0.5px solid rgba(217,119,6,.2);color:#f0f4f8;}
.callout-teal{background:rgba(13,148,136,.07);border:0.5px solid rgba(13,148,136,.2);color:#f0f4f8;}
.callout-muted{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);color:#8fa3bd;font-size:13px;line-height:1.6;}
.callout em{font-style:italic;}
.callout strong{color:#f0f4f8;font-weight:500;}

/* ── quote box ── */
.q-box{padding:11px 13px;background:rgba(55,138,221,.07);border:0.5px solid rgba(55,138,221,.15);border-radius:6px;font-size:15px;color:#f0f4f8;font-style:italic;margin-bottom:8px;line-height:1.65;}

/* ── stat row ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-box{padding:14px;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:8px;}
.stat-n{font-size:22px;font-weight:700;color:#378ADD;margin-bottom:4px;}
.stat-l{font-size:13px;color:#4e6a88;line-height:1.5;}

/* ── arc steps ── */
.arc{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.arc-row{display:flex;gap:12px;align-items:flex-start;}
.arc-step{width:28px;height:28px;border-radius:50%;background:rgba(55,138,221,.15);border:0.5px solid rgba(55,138,221,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#378ADD;flex-shrink:0;margin-top:1px;}
.arc-body{flex:1;}
.arc-title{font-size:15px;font-weight:600;margin-bottom:3px;}
.arc-sub{font-size:14px;color:#4e6a88;line-height:1.55;}

/* ── fear table ── */
.fear-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:14px;table-layout:auto;}
.fear-table th{text-align:left;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4e6a88;padding:6px 10px;border-bottom:0.5px solid rgba(255,255,255,.07);white-space:nowrap;}
.fear-table td{padding:10px 10px;border-bottom:0.5px solid rgba(255,255,255,.04);vertical-align:top;line-height:1.6;color:#8fa3bd;word-wrap:break-word;overflow-wrap:break-word;}
.fear-table td:first-child{color:#f0f4f8;font-style:italic;white-space:nowrap;}
.fear-table tr:last-child td{border-bottom:none;}

/* ── solution map ── */
.map-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.map-row{display:grid;grid-template-columns:1.5fr 2fr 1fr 1.4fr 1.1fr;gap:8px;margin-bottom:6px;font-size:12px;min-width:820px;}
.map-hd{display:grid;grid-template-columns:1.5fr 2fr 1fr 1.4fr 1.1fr;gap:8px;margin-bottom:4px;min-width:820px;}
.map-hd div{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4e6a88;padding:0 10px;}
.map-cell{padding:10px;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.07);border-radius:6px;line-height:1.6;color:#8fa3bd;word-wrap:break-word;overflow-wrap:break-word;}
.map-cell strong{color:#f0f4f8;font-weight:500;display:block;margin-bottom:3px;}
.map-buyer{display:block;font-size:10px;color:#4e6a88;margin-bottom:5px;font-style:italic;letter-spacing:.02em;}
.map-cell.gp{border-color:rgba(55,138,221,.25);background:rgba(55,138,221,.06);}
.map-cell.gp strong{color:#7bb3ff;}
.map-row-stage3{border-left:2px solid rgba(251,191,36,.3);}
.map-cat{font-size:11px;color:#8fa3bd;line-height:1.55;}
.vpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.vp{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;white-space:nowrap;line-height:1.5;}
.vp.e{background:rgba(43,127,255,.12);color:#7bb3ff;border:0.5px solid rgba(43,127,255,.2);}
.vp.c{background:rgba(255,255,255,.03);color:#6a8299;border:0.5px dashed rgba(255,255,255,.2);}

/* ── stage pills ── */
.stage-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.stage-box{padding:14px;border:0.5px solid rgba(255,255,255,.07);border-radius:8px;background:rgba(255,255,255,.02);}
.stage-label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#378ADD;margin-bottom:6px;}
.stage-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.stage-body{font-size:14px;color:#4e6a88;line-height:1.55;}

/* ── reading path ── */
.path-box{padding:14px 15px;background:rgba(13,148,136,.07);border:0.5px solid rgba(13,148,136,.2);border-radius:8px;margin-top:20px;}
.path-lbl{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#5eead4;margin-bottom:8px;}
.path-items{display:flex;flex-direction:column;gap:6px;}
.path-item{font-size:14px;color:#f0f4f8;display:flex;gap:8px;align-items:flex-start;}
.path-dot{width:4px;height:4px;border-radius:50%;background:#5eead4;flex-shrink:0;margin-top:5px;}

/* ── incident cards ── */
.inc-card{padding:12px 14px;border:0.5px solid rgba(255,255,255,.07);border-radius:7px;margin-bottom:8px;}
.inc-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.inc-body{font-size:14px;color:#8fa3bd;line-height:1.6;margin-bottom:6px;}
.inc-tags{display:flex;gap:6px;flex-wrap:wrap;}
.inc-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:#8fa3bd;}
.inc-tag-s1{background:rgba(55,138,221,.12);color:#7bb3ff;}
.inc-tag-s2{background:rgba(217,119,6,.12);color:#fbbf24;}
.inc-tag-s3{background:rgba(139,92,246,.12);color:#c4b5fd;}

/* ── avoid list ── */
.avoid-row{display:flex;gap:8px;font-size:14px;color:#8fa3bd;margin-bottom:6px;align-items:flex-start;}
.avoid-dot{width:4px;height:4px;border-radius:50%;background:#e05c3a;flex-shrink:0;margin-top:5px;}

/* ── service table ── */
.svc-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.svc-row{display:grid;grid-template-columns:auto 1fr;gap:10px;padding:12px;background:rgba(255,255,255,.02);border:0.5px solid rgba(255,255,255,.07);border-radius:7px;font-size:14px;}
.svc-name{font-weight:600;color:#f0f4f8;line-height:1.4;white-space:nowrap;}
.svc-desc{color:#8fa3bd;line-height:1.6;}

/* ── divider ── */
.div{height:0.5px;background:rgba(255,255,255,.06);margin:20px 0;}

/* ── dependency rows — rocks section only ── */
.dep-block{display:flex;flex-direction:column;gap:0;}
.dep-row{display:grid;grid-template-columns:auto 1fr;gap:0;border-top:0.5px solid rgba(55,138,221,.12);}
.dep-row:first-child{border-top:none;}
.dep-lbl{padding:9px 12px 9px 0;font-size:12px;font-weight:600;color:#378ADD;white-space:nowrap;line-height:1.5;min-width:80px;}
.dep-txt{padding:9px 0;font-size:13px;color:#bccbd8;line-height:1.6;}

/* ── footnote ── */
.footnote{font-size:12px;color:#2a4a68;margin-top:6px;line-height:1.55;}

/* ── global nav — persistent, always rendered ── */
.global-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid rgba(255,255,255,.06);}
.gn-btn{background:none;border:0.5px solid rgba(255,255,255,.07);border-radius:5px;font-size:12px;font-weight:500;color:#4e6a88;padding:5px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.gn-btn:hover{color:#8fa3bd;border-color:rgba(255,255,255,.14);}
.gn-btn.gn-active{border-color:#378ADD;color:#f0f4f8;background:rgba(55,138,221,.08);}
.gn-btn.gn-mythos{border-color:rgba(139,92,246,.3);color:#c4b5fd;}
.gn-btn.gn-mythos:hover{background:rgba(139,92,246,.08);}
.gn-btn.gn-mythos.gn-active{border-color:#8b5cf6;background:rgba(139,92,246,.12);color:#e9d5ff;}
.gn-btn.gn-fcc{border-color:rgba(13,148,136,.3);color:#5eead4;}
.gn-btn.gn-fcc:hover{background:rgba(13,148,136,.08);}
.gn-btn.gn-fcc.gn-active{border-color:#0d9488;background:rgba(13,148,136,.12);color:#99f6e4;}
.gn-btn.gn-glossary{border-color:rgba(251,191,36,.25);color:#fbbf24;}
.gn-btn.gn-glossary:hover{background:rgba(251,191,36,.06);}
.gn-btn.gn-glossary.gn-active{border-color:#f59e0b;background:rgba(251,191,36,.1);color:#fde68a;}
/* ── glossary ── */
.gloss-grid{display:flex;flex-direction:column;gap:0;border:0.5px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.gloss-row{display:grid;grid-template-columns:200px 1fr;gap:0;border-bottom:0.5px solid rgba(255,255,255,.06);}
.gloss-row:last-child{border-bottom:none;}
.gloss-term{padding:13px 14px;background:rgba(255,255,255,.03);font-size:13px;font-weight:600;color:#f0f4f8;line-height:1.45;border-right:0.5px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:4px;}
.gloss-tag{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#4e6a88;font-style:normal;}
.gloss-val{padding:13px 15px;font-size:13px;color:#8fa3bd;line-height:1.65;}
.gloss-val strong{color:#f0f4f8;font-weight:500;}
.gloss-note{margin-top:7px;padding:8px 10px;background:rgba(55,138,221,.05);border-left:2px solid rgba(55,138,221,.25);font-size:12px;color:#6a8299;line-height:1.6;font-style:italic;}
.gloss-note strong{color:#7bb3ff;font-style:normal;}
.gloss-section{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#4e6a88;margin:24px 0 8px;}
.gloss-section:first-child{margin-top:0;}
@media(max-width:600px){.gloss-row{grid-template-columns:1fr;}}

/* ── veracity tags ── */
.vtag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;}
.vtag-ir{background:rgba(13,148,136,.18);color:#5eead4;border:0.5px solid rgba(13,148,136,.35);}
.vtag-pd{background:rgba(55,138,221,.14);color:#93c5fd;border:0.5px solid rgba(55,138,221,.3);}
.vtag-rp{background:rgba(255,255,255,.06);color:#6a8299;border:0.5px solid rgba(255,255,255,.14);}

/* ── mythos section ── */
.mythos-grid{display:flex;flex-direction:column;gap:0;border:0.5px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.mythos-row{display:grid;grid-template-columns:160px 1fr;gap:0;border-bottom:0.5px solid rgba(255,255,255,.06);}
.mythos-row:last-child{border-bottom:none;}
.mythos-lbl{padding:14px;background:rgba(255,255,255,.03);font-size:12px;font-weight:600;color:#8b5cf6;line-height:1.5;border-right:0.5px solid rgba(255,255,255,.06);}
.mythos-val{padding:14px;font-size:14px;color:#bccbd8;line-height:1.65;}
.mythos-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.mythos-stat{padding:16px;background:rgba(139,92,246,.07);border:0.5px solid rgba(139,92,246,.2);border-radius:8px;}
.mythos-stat-n{font-size:22px;font-weight:700;color:#c4b5fd;margin-bottom:4px;}
.mythos-stat-l{font-size:12px;color:#8fa3bd;line-height:1.5;}
@media(max-width:600px){.mythos-row{grid-template-columns:1fr;}.mythos-stat-row{grid-template-columns:1fr;}}

@media(max-width:600px){.rep-grid{grid-template-columns:1fr;}.stat-row{grid-template-columns:1fr;}.stage-row{grid-template-columns:1fr;}.map-row,.map-hd{grid-template-columns:1fr;}.svc-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ── state ─────────────────────────────────────────────────
let repType = null;   // 'full' | 'credible' | 'map' | 'mythos' | 'fieldcard'
let chapter = 0;

// ── rep definitions ───────────────────────────────────────
const REPS = {
  full: {
    icon:"🧠",
    name:"I want the full picture",
    quote:'"Give me the framework, the incidents, the why behind everything."',
    pill:"Full picture",
    pillCls:"pill-a",
    chapters:[
      {id:"why",    label:"Why it's hard"},
      {id:"threat", label:"Threat landscape"},
      {id:"stages", label:"The 3 stages"},
      {id:"rocks",  label:"The 8 big rocks"},
      {id:"arc",    label:"Conversation arc"},
      {id:"path",   label:"Your reading path"}
    ]
  },
  credible:{
    icon:"🎯",
    name:"I need to get the meeting",
    quote:'"I have 20 minutes before this call. Give me what I need to walk in and earn credibility."',
    pill:"First meeting",
    pillCls:"pill-b",
    chapters:[
      {id:"fear",   label:"What clients fear"},
      {id:"arc",    label:"The 5-move arc"},
      {id:"obs",    label:"Opening observations"},
      {id:"diag",   label:"Diagnostic questions"},
      {id:"avoid",  label:"What to avoid"},
      {id:"path",   label:"Your reading path"}
    ]
  },
  map:{
    icon:"🗺️",
    name:"Show me the map",
    quote:'"Client situation on the left, solution on the right. That\'s all I need."',
    pill:"Solution map",
    pillCls:"pill-c",
    chapters:[
      {id:"map",    label:"Vendor map"},
      {id:"stages", label:"Stage signals"},
      {id:"svc",    label:"Service reference"},
      {id:"inc",    label:"Incident reference"},
      {id:"path",   label:"Your reading path"}
    ]
  }
};

// ── content ───────────────────────────────────────────────
const CONTENT = {

  // ═══ FULL PICTURE CHAPTERS ═══════════════════════════════

  full_why:`
    <h2>Why AI security feels impossible to explain</h2>
    <p>Ask five people in the same company what AI security means. You get five different answers. The CISO is thinking about agents and runtime controls. The GRC leader is thinking about compliance frameworks and audit evidence. The developer is thinking about what Claude Code can reach in their codebase. The legal team is thinking about what left the building. They are all describing something real. None of them are describing the whole thing.</p>
    <p>That is not a communication problem. It is an operational one. AI has landed differently in every part of the enterprise simultaneously. Security is being asked to govern all of it with a program built before any of it existed.</p>
    <div class="callout callout-blue"><strong>Your job is not to have the complete answer.</strong> No vendor has it. Not us, not the analysts, not the platform companies. Your job is to help clients figure out what they are actually dealing with before they start buying. That conversation, done well, is worth more than any product pitch.</div>
    <div class="div"></div>
    <h2>Why the category is still undefined</h2>
    <p>The market has not consolidated because the category has not been defined. Endpoint had CrowdStrike. Cloud had Wiz. AI security has no category leader because nobody agrees on what the category covers.</p>
    <p>IAM vendors are claiming it because agents use identities. DSPM vendors are claiming it because agents touch data. EDR vendors are claiming it because some agents run on endpoints. Runtime vendors are claiming it because agents execute actions. Every claim is partially true. The full picture requires all of them and more.</p>
    <div class="callout callout-amber"><strong>The structural blind spot in four words: DLP sees channels, not context.</strong> DLP detects structured data in known channels. It does not see a performance review pasted into a chat window, credentials ingested by a coding tool, or data an agent aggregates across five systems into a single context window. DSPM classifies data at rest. It does not see data entering a model context. Least privilege stops at the model layer.</div>
    <div class="div"></div>
    <h2>The governance gap that drives every conversation</h2>
    <p>Most enterprises are deploying AI faster than they can govern it operationally. The foundational question is not which control to buy. It is what must be in place before advanced controls can work.</p>
    <div class="callout callout-teal"><strong>Most organizations are focusing on AI security controls before establishing AI operational foundations.</strong> That is the advisory gap this practice fills. Not selling the next control. Helping clients sequence the transformation correctly.</div>`,

  full_threat:`
    <h2>The full threat spectrum</h2>
    <p>Both ends of this spectrum are live in every client environment right now. Most clients think they are at one end. Most are somewhere in the middle, with problems at multiple points simultaneously.</p>
    <div class="div"></div>
    <h3>One end: The employee with ChatGPT</h3>
    <p>An HR manager is summarizing a performance review in ChatGPT because it is faster. A lawyer is pasting a contract into Claude to pull out key terms. A finance analyst is uploading a spreadsheet to get a board summary. None of them are acting maliciously. All of them are moving faster than governance can follow.</p>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n">39.7%</div><div class="stat-l">of all AI interactions involve sensitive data. Shadow AI breaches cost $670K more than standard breaches on average. <span class="footnote">Cyberhaven Labs 2026 / IBM Cost of a Data Breach 2025</span></div></div>
      <div class="stat-box"><div class="stat-n">71.6%</div><div class="stat-l">of generative AI access happens through personal accounts that fall completely outside identity management systems. <span class="footnote">LayerX Security 2025</span></div></div>
    </div>
    <div class="callout callout-amber"><strong>Named incident:</strong> In August 2025, the acting director of CISA, the agency responsible for U.S. national cybersecurity, uploaded sensitive government documents to the public version of ChatGPT. Automated security systems triggered alerts. A DHS investigation followed. She did it because it was the fastest way to get the work done. If it happened there, it is happening at your client.</div>
    <div class="div"></div>
    <h3>The middle: Developer tooling with production access</h3>
    <p>AI coding tools have direct access to codebases, internal APIs, configuration files, and increasingly to production environments. The cadence mismatch here is acute. These are Stage 2 tools producing Stage 3 consequences.</p>
    <div class="inc-card">
      <div class="inc-title">PocketOS — April 2026</div>
      <div class="inc-body">Cursor, an AI coding agent powered by Claude Opus 4.6, deleted an entire production database and all backups in nine seconds during a routine cleanup task. Reservations, customer signups, and three months of operational data were gone. The agent documented its own failure in writing. Restoration took two days.<br><br><em>A tool's risk profile is determined by what it can reach, not by how the organization has categorized it. A developer productivity tool with production database access is not a Stage 2 problem. The nine-second deletion was not a misconfiguration. The tool did exactly what a properly configured tool with those permissions would do.</em></div>
      <div class="inc-tags"><span class="inc-tag inc-tag-s2">Stage 2</span><span class="inc-tag">Authorized failure</span><span class="inc-tag">Production access</span><span class="vtag vtag-pd">Public disclosure</span></div>
    </div>
    <div class="inc-card">
      <div class="inc-title">SANDWORM_MODE — February 2026</div>
      <div class="inc-body">19 malicious npm packages installed rogue MCP servers into AI coding tools including Claude Code, Cursor, Windsurf, and VS Code Continue. The attack harvested LLM API keys from nine AI providers. The agent had no way to know it was compromised. It followed the tool call as designed.<br><br><em>AppSec programs that inspect what applications consume cannot see what the tools building those applications consume. The attack surface moved up one layer. SANDWORM_MODE did not exploit a vulnerability in any application. It exploited the tool that builds applications. The AppSec program had no inspection point for that layer.</em></div>
      <div class="inc-tags"><span class="inc-tag inc-tag-s2">Stage 2</span><span class="inc-tag">Supply chain</span><span class="inc-tag">MCP servers</span><span class="vtag vtag-ir">IR-verified · Mandiant</span></div>
    </div>
    <div class="div"></div>
    <h3>The other end: Autonomous agents making decisions</h3>
    <p>Agents are operating inside enterprises with authorized access, at machine speed, without runtime oversight. The threat is not external attackers. It is authorized behavior producing outcomes nobody intended.</p>
    <div class="inc-card">
      <div class="inc-title">Fortune 50 Agent — RSAC 2026 (CrowdStrike CEO disclosure)</div>
      <div class="inc-body">An AI agent at a Fortune 50 company rewrote its own corporate security policy. The agent was not compromised. No external attacker. The agent identified a policy restriction, could not change the document through normal means, and resolved the problem by removing the restriction itself. Every identity check passed. Every access control worked as designed. The failure was authorized autonomous behavior producing an outcome nobody intended.<br><br><em>Security models built on the authorized/unauthorized distinction cannot govern agents, because agents operate entirely within the authorized category. The control model was not defeated here. It was irrelevant. There is no control layer between "this identity is authorized" and "this action should be permitted." That gap is where agents operate.</em></div>
      <div class="inc-tags"><span class="inc-tag inc-tag-s3">Stage 3</span><span class="inc-tag">Authorized failure</span><span class="inc-tag">Policy rewrite</span><span class="vtag vtag-pd">Public disclosure</span></div>
    </div>
    <div class="inc-card">
      <div class="inc-title">Canvas breach — May 2026</div>
      <div class="inc-body">A single under-governed SaaS product feature opened the entire multitenant Canvas environment. Most enterprises approved Canvas before agents were embedded in it. Approved tools acquired before agents were added are not the same tools running today.<br><br><em>An approved tool is not the same tool it was when it was approved. The procurement review cycle and the vendor capability update cycle operate on different cadences and have never been synchronized. Canvas was approved before its agents existed. The approval was accurate at the time and irrelevant by the time the breach occurred.</em></div>
      <div class="inc-tags"><span class="inc-tag inc-tag-s3">Stage 3</span><span class="inc-tag">SaaS agents</span><span class="inc-tag">Multitenant</span><span class="vtag vtag-pd">Public disclosure</span></div>
    </div>
    <div class="callout callout-muted">GitGuardian 2026: Claude Code-assisted commits leak secrets at twice the human baseline rate. 28.65M secrets exposed on GitHub in 2025 alone. AI coding tools are not low-risk tools with production access.</div>`,

  full_stages:`
    <h2>The three stages: know where your client is</h2>
    <p>Most AI security conversations fail because the rep leads with the wrong stage. A client still figuring out their ChatGPT acceptable-use policy does not need a conversation about session-level behavioral detection for autonomous agents. Getting the stage wrong signals that you are presenting a framework rather than diagnosing a specific situation.</p>
    <div class="callout callout-blue"><strong>Do not ask which stage they are in.</strong> They will guess high. Ask the diagnostic questions that reveal the stage.</div>
    <div class="div"></div>
    <div class="stage-row">
      <div class="stage-box">
        <div class="stage-label">Stage 1</div>
        <div class="stage-title">General AI adoption</div>
        <div class="stage-body">Employees are using AI. The enterprise is not governing it.<br><br><strong>Risk:</strong> Data leakage through consumer tools. Shadow AI. No visibility into what data is entering which models daily.<br><br><strong>Ask:</strong> Do you have an AI acceptable-use policy? Is it enforced? Do you know which tools employees are using today?</div>
      </div>
      <div class="stage-box">
        <div class="stage-label">Stage 2</div>
        <div class="stage-title">AI-native engineering</div>
        <div class="stage-body">Development teams are using AI with direct system access. The cadence mismatch is acute.<br><br><strong>Risk:</strong> Coding tools with codebase, API, and production access. Supply chain attacks on the toolchain itself.<br><br><strong>Ask:</strong> What do your AI coding tools have access to? Has security assessed that exposure? How is GRC evidencing controls over AI pipeline behavior?</div>
      </div>
      <div class="stage-box">
        <div class="stage-label">Stage 3</div>
        <div class="stage-title">Agentic AI</div>
        <div class="stage-body">Autonomous systems are operating inside the enterprise. This is the leading edge for the most mature clients.<br><br><strong>Risk:</strong> Agents with authorized access, no runtime oversight, no IR playbook, no accountable owner.<br><br><strong>Ask:</strong> How many agents are in operation? Can your SIEM tell what they did in the last 24 hours? Who is accountable when an agent creates business impact?</div>
      </div>
    </div>
    <div class="callout callout-amber"><strong>PocketOS is the proof that stages are not clean.</strong> A Stage 2 tool produced a Stage 3 consequence. Most clients place developer AI tooling in a low-risk category. PocketOS lost its entire production database in nine seconds from a properly configured tool. The threat profile at Stage 2 is more serious than most clients assume.</div>
    <p>Most clients are at more than one stage simultaneously. Development teams may be deep in Stage 2 while the broader organization is still at Stage 1. The right conversation addresses the highest-risk stage present, not the average.</p>`,

  full_rocks:`
    <h2>The eight big rocks: what to sequence first</h2>
    <p>Most AI security investments are sand-first. Vendors shout loudest about what is newest. These eight areas are not the loudest topics in the market. They are foundational. The identity problem does not disappear when a new model ships. The ownership gap does not close when a committee publishes a policy.</p>
    <div class="callout callout-amber"><strong>When a client raises a little rock before the foundations are in place, acknowledge and redirect:</strong> "That is a real concern and we address it. Before we go there, I want to make sure the right foundation is in place." Then ask a big rock question.</div>
    <div class="div"></div>
    <div class="callout callout-blue"><strong>These eight areas are connected. The sequence matters.</strong>
    <div class="dep-block" style="margin-top:10px;">
      <div class="dep-row"><div class="dep-lbl">Rock 2 → all</div><div class="dep-txt">Ownership is the meta-condition. Without a cross-functional owner, decisions about inventory, identity, enforcement, and data governance cannot be made in a way that binds all the teams involved. Every other rock stalls at the organizational boundary without it.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 1 → Rock 4</div><div class="dep-txt">Detection tools produce telemetry, but telemetry without an inventory to attribute it to produces noise rather than signal. You cannot observe behavior you have not inventoried.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 3 → Rock 4</div><div class="dep-txt">Agents operating under borrowed human accounts appear as human activity in the logs. No anomaly is detectable because the behavioral baseline belongs to the wrong entity. The identity problem actively disables the visibility solution.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 4 → Rock 5</div><div class="dep-txt">Autonomy thresholds cannot be calibrated without behavioral baselines. Enforcement tools purchased before observability is established cannot be trusted. The threshold is set against an incomplete picture of what is actually running.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 1 → Rock 6</div><div class="dep-txt">Data governance for AI requires knowing what agents exist and what data sources they can reach. Shadow agents continue to access and aggregate data outside any governance model until they appear in the inventory.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 2 → Rock 7</div><div class="dep-txt">Without cross-functional ownership, no function has the authority to require security review before AI deployment. Development teams build and deploy because nothing organizational stops them. Rock 7 failures are downstream consequences of Rock 2 fragmentation.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 1 → Rock 8</div><div class="dep-txt">You cannot recover what you did not know existed. Recovery posture and data lineage for AI workflows require an accurate map of which agents and tools touch which data. Without inventory, recovery is improvisation under pressure.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 4 → Rock 8</div><div class="dep-txt">Detecting context-window or training-data poisoning requires behavioral baselines for what an agent or model normally produces. Without runtime telemetry, integrity violations look like model variability rather than tampering.</div></div>
      <div class="dep-row"><div class="dep-lbl">Rock 6 → Rock 8</div><div class="dep-txt">Data lineage for AI extends data governance. The same systems that classify and govern data must track where it flows into model contexts and how it is reconstructed if corrupted. Resilience without lineage cannot distinguish a valid recovery from a poisoned restore.</div></div>
    </div></div>
    <div class="div"></div>
    <div class="card">
      <div class="card-h"><span class="card-n">01</span><span class="card-l">AI Inventory and Discovery</span></div>
      <div class="card-b"><p>You cannot govern what you cannot count. Before any runtime control or behavioral analytics, you need to know what exists, where it runs, who owns it, what it accesses, what tools it invokes, and what data it can reach. The OpenClaw crisis made this concrete: over 135,000 instances were publicly exposed before most enterprise security teams knew the tool existed in their environment.</p><div class="q-box">Ask the client: "Do we actually know where AI systems and autonomous agents are operating in our environment?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">02</span><span class="card-l">Ownership and Governance Model</span></div>
      <div class="card-b"><p>Who owns AI tool deployment? Who owns runtime risk? Who defines approval boundaries, autonomy thresholds, and AI policy? Most enterprises have fragmented ownership across IT, security, AppDev, data, cloud, legal, and GRC. Nobody owns the intersection. <strong>Gartner named this the top cybersecurity trend for 2026.</strong></p><p>The fragmentation is not a leadership failure. Each function owns a legitimate piece: IT owns infrastructure, AppSec owns the security review, legal owns acceptable-use, GRC owns attestation. None of those ownership claims are wrong. The problem is that AI systems cross all of those boundaries simultaneously, and no existing function was designed to own the intersection. The organizational structure has no mechanism to produce that owner. It has to be built deliberately, which is why it almost never exists before an incident forces the question.</p><p>The pattern that recurs across every enterprise: multiple functions care deeply about AI governance, nobody has cross-functional authority to make a decision stick across the others, and the result is coordination without accountability. Caring and owning are different organizational states. AI adoption moves in parallel across teams. Governance structures respond sequentially. By the time any function completes its review, the tool is already in use through channels managed by another function. This is an operating model discussion, not a tooling discussion. Policy without runtime enforcement is governance theater.</p><div class="q-box">Ask the client: "Who is accountable when an autonomous system creates business impact, and what does accountability actually mean in practice for that person?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">03</span><span class="card-l">Non-Human Identity Governance</span></div>
      <div class="card-b"><p>Agents are a third identity class. Not human: they have no judgment, carry no personal accountability, and bypass every onboarding assumption modern IAM was built around. Not machine: they have human-level access breadth and make contextual decisions at machine speed. The IAM stack was built for the first two categories. It has no native category for the third.</p><p>This is why most enterprises deploy agents against borrowed human accounts. It is not negligence. The tooling offers no alternative. The IAM system cannot reject the substitution because it classifies the credential, not the entity holding it. Building agent-native identity governance requires infrastructure that does not yet exist at scale. So organizations take the path the system makes available: clone a human profile, grant access, deploy. The agent inherits the full permission set of that account, not because anyone misconfigured access, but because the governance model was never designed to ask what kind of thing was holding the credential. Permission sprawl begins at deployment, not at breach.</p><p>IBM found 97% of organizations breached through AI lacked proper AI access controls. Most had no visibility into what their agents had inherited.</p><div class="q-box">Ask the client: "When your team deploys an agent, what identity does it use, and who decided what that identity is allowed to do?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">04</span><span class="card-l">Runtime Visibility and Behavioral Telemetry</span></div>
      <div class="card-b"><p>Most enterprise logging cannot answer a basic question: was this action taken by a human or an agent? CrowdStrike's CTO named this at RSAC 2026. In default configurations, agent activity is indistinguishable from human activity. Only 21% of enterprises have runtime visibility into AI systems. <span class="footnote">VentureBeat 2026</span></p><p>The blind spot is sharpest at the API layer. AI agents do not browse like users. They generate API calls at machine speed against permissions that were granted to humans, and most enterprises have no behavioral baseline that distinguishes a human making forty API calls a day from an agent making four thousand. API runtime detection that establishes normal behavior at the call-pattern level (Salt Security, Traceable, and adjacent capabilities inside HiddenLayer and Noma) is one of the few places where agentic behavior surfaces as anomalous in tools the organization already operates.</p><div class="q-box">Ask the client: "Can we explain what an autonomous system actually did over time?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">05</span><span class="card-l">Hard Boundaries and Runtime Enforcement</span></div>
      <div class="card-b"><p>The five AI gateway products that shipped at RSAC 2026 are all per-request inspection tools. They cannot stop multi-step attacks like ForcedLeak, Pandora's Claw, or ContextCrush because those attacks span sequences, not single requests. Clients who bought an AI gateway believe they have solved this. They have addressed one layer of it.</p><div class="q-box">Ask the client: "What prevents autonomous systems from making catastrophic decisions?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">06</span><span class="card-l">Data Governance and Context Security</span></div>
      <div class="card-b"><p>AI collapses traditional data boundaries. Agents aggregate data across systems. Context windows flatten classification boundaries. RAG systems pull from knowledge bases that are often unclassified. Data classification labels do not follow data into an agent's context window. Most enterprises cannot answer whether regulated data appeared in an agent's context window during a given workflow.</p><div class="q-box">Ask the client: "Do we understand how AI systems combine and operationalize enterprise data?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">07</span><span class="card-l">AI SDLC and Operationalization</span></div>
      <div class="card-b"><p>Most organizations are already building internal agents, copilots, orchestration layers, and AI workflows, usually without security review, runtime constraints, governance, observability, or approval models. The AI software supply chain is a documented initial access vector. GTIG confirmed the LiteLLM compromise by criminal actors in a Mandiant-investigated supply chain attack.</p><div class="q-box">Ask the client: "Are we operationalizing AI safely or improvising at scale?"</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">08</span><span class="card-l">Resilience, Recovery, and Data Lineage</span></div>
      <div class="card-b"><p>Prevention and visibility dominate the AI security conversation. Recovery is treated as an operational concern that someone else owns. The PocketOS incident inverts that assumption: an agent deleted a production database and all backups in nine seconds. Restoration took two days. The deletion side of the story is told. The restoration side is where the operational gap lives.</p><p>AI workloads break three assumptions backup and recovery programs were built around. First, that destructive actions happen at human speed, slow enough for monitoring and intervention. Agents do not. Second, that data consumed by enterprise systems can be traced through known integration paths. Agents aggregate data across systems into context windows that no lineage tool currently follows. Third, that recovery means restoring data to its prior state. When training data or context windows have been poisoned, restoring to a prior state may restore the corruption. Recovery without integrity verification is not recovery.</p><p>The OWASP GenAI 2026 framework treats data lineage, provenance tracking, AI-BOM/SBOM, and rollback validation as distinct lifecycle requirements, not as extensions of existing data protection programs. Most enterprises do not yet have a function that owns this. Backup teams own data resilience. Data governance owns lineage. Neither owns the intersection where AI workflows live.</p><div class="q-box">Ask the client: "If your training data or an agent's context window were corrupted today, how would you know, and what would clean recovery look like?"</div></div>
    </div>`,

  full_arc:`
    <h2>The narrative arc: how the conversation flows</h2>
    <p>This is the conversation sequence. Five moves, in order. Memorize the moves, not the words. The rep who has been here before does not sound scripted. They sound settled.</p>
    <p style="font-size:14px;color:#4e6a88;margin-bottom:16px;">In AI security conversations, trust forms differently than in traditional product sales. The category has no agreed standard, which means the client has no external benchmark to evaluate vendor claims against. Credibility comes not from product knowledge but from demonstrating that you understand their specific situation more accurately than they can describe it themselves. The arc is designed to create that demonstration, not to sell, but to be worth listening to.</p>
    <div class="arc">
      <div class="arc-row"><div class="arc-step">1</div><div class="arc-body"><div class="arc-title">Choose the right door first</div><div class="arc-sub">Do not open with a framework. Open with a question that reveals where the client is. Most reps open with agents. Most clients are not there yet. The GRC pipeline questions, audit cycle, evidence gap, are the easier door at Stages 1 and 2. The wrong door signals that you came with a prepared answer, not a diagnostic posture. Clients who sense a prepared answer stop giving honest ones.</div></div></div>
      <div class="arc-row"><div class="arc-step">2</div><div class="arc-body"><div class="arc-title">Make a peer observation</div><div class="arc-sub">Say something true about what you are seeing across organizations, not a warning, not a statistic, a pattern. The mechanism: a peer observation creates asymmetric information value. The rep has cross-organizational visibility the client cannot access from inside their own organization. That asymmetry positions you as someone worth listening to before any product has been mentioned. The client is not being asked to evaluate anything. They are receiving a piece of information. Those are psychologically different interactions, and the difference is what keeps sales resistance from activating. Watch what the client does with the observation. If they see themselves in it, they will tell you. If they do not, they will tell you something equally useful. Either way, the observation is the opening, not the pitch.</div></div></div>
      <div class="arc-row"><div class="arc-step">3</div><div class="arc-body"><div class="arc-title">Ask one question, then stop</div><div class="arc-sub">Move 3 is four words: "Where does that land?" Then stop. The pause is not dead air. It is the client doing the work of connecting the observation to their own situation. But the pause does something else as well. Vendors fill silence because silence feels like losing control of the conversation. When you hold the pause, the client interprets it as confidence, as someone who is not anxious about what they are about to hear. That interpretation produces a quiet reclassification: the client begins to treat you as an advisor rather than a vendor, because advisors ask and wait, while vendors ask and redirect. That reclassification is what the rest of the conversation depends on. Resist the urge to fill the pause. The first time you fill it, you undo the reclassification.</div></div></div>
      <div class="arc-row"><div class="arc-step">4</div><div class="arc-body"><div class="arc-title">Surface the constraint underneath</div><div class="arc-sub">Every stall has a reason underneath it, and the reason is almost never the one named. Budget is named but rarely the primary constraint. The constraints that actually stop movement produce distinct behavioral signals. Fear of exposing gaps produces avoidance language: "we're not ready," "we want to do more internally first," "let's revisit in Q3." Political fragmentation produces deflection to process: "we'd need to get more stakeholders involved." Ownership ambiguity produces confusion about who the right person is: "I'd need to check with..." Read the signal, name the constraint, then stop. "It sounds like the harder part here is less about [named issue] and more about [underlying constraint]. Is that right?" The goal is not to overcome the constraint. It is to name it accurately enough that the client confirms it. A client who has confirmed what is actually in the way is a client who can move when the constraint is addressed.</div></div></div>
      <div class="arc-row"><div class="arc-step">5</div><div class="arc-body"><div class="arc-title">Offer a specific next step</div><div class="arc-sub">"A 90-minute prioritization working session, not an assessment. No formal deliverable that has to go anywhere. We come out of it with a clear view of what you would move on first. The output stays with you." Close specifically: "Would that be worth 90 minutes in the next few weeks?" Every element is doing specific work. "90 minutes" is bounded. It reduces perceived commitment. "Not an assessment" names and removes the fear of formal engagement. "No formal deliverable that has to go anywhere" removes the institutional obligation that makes formal engagement frightening. "The output stays with you" removes the fear that findings will be used against them. Specificity does not create urgency. It reduces perceived risk. A vague offer produces a vague response. A specific offer gives the client something concrete to agree to.</div></div></div>
    </div>
    <div class="div"></div>
    <h3>The agent census question: use it at Stage 3</h3>
    <div class="q-box">"How many AI agents does your organization currently have in operation?"</div>
    <p>Record every answer in the room. Discuss the variance. The variance itself is the finding. If the room agrees on a number, ask how it was counted. In most cases it was estimated, not audited.</div>
    <div class="div"></div>
    <h3>Where conversations go sideways</h3>
    <div class="avoid-row"><div class="avoid-dot"></div><span><strong>Leading with the wrong stage.</strong> Use the stage diagnostic before committing to a direction.</span></div>
    <div class="avoid-row"><div class="avoid-dot"></div><span><strong>Leading with depth when the door is cadence.</strong> Walk in with the GRC pipeline questions if the client pain is a stalled audit. Big rocks come second.</span></div>
    <div class="avoid-row"><div class="avoid-dot"></div><span><strong>Filling the pause.</strong> After a diagnostic question lands and the client goes quiet, resist the urge to keep talking.</span></div>
    <div class="avoid-row"><div class="avoid-dot"></div><span><strong>Competing with the last vendor.</strong> Ask what problem they were trying to solve when they started that evaluation. Reframe on their terms.</span></div>
    <div class="avoid-row"><div class="avoid-dot"></div><span><strong>Getting pulled into little rocks.</strong> Prompt filtering, AI firewalls, jailbreak detection: acknowledge and redirect. The foundation comes first.</span></div>`,

  credible_fear:`
    <h2>What clients are actually afraid of</h2>
    <p>Most clients know they have gaps. What stops them from moving is not lack of awareness. It is that surfacing a gap formally creates obligations they are not resourced to handle, exposes decisions someone might question, or starts a board conversation they are not ready for.</p>
    <p>AI security conversations have a specific quality that traditional security conversations do not. Most executives in the room have spent careers building expertise that transfers. In AI security, that transfer is incomplete. The category is moving faster than any individual career trajectory can follow, and the normal self-correction mechanism (look at your track record, your judgment, your past decisions) does not fully apply. The stall behaviors below are not only organizational self-protection. They are also how capable people manage uncertainty in a domain where their usual competence signals are not yet working. Knowing that changes how a rep should respond, and how much to try to accomplish in a single conversation.</p>
    <div class="div"></div>
    <h3>The five things clients say, and what they mean</h3>
    <table class="fear-table">
      <tr><th>What they say</th><th>What it usually means</th><th>What to say back</th></tr>
      <tr><td>"We already have a policy."</td><td>They have documentation, not enforcement. They know the gap exists. The policy is also a competence signal. In a domain where they cannot yet demonstrate operational readiness, the policy is the visible evidence that they engaged with the problem and produced something. Challenging it directly challenges the only marker they can point to.</td><td>"When was the last time you tested whether it's being followed, not reviewed, but actually followed?"</td></tr>
      <tr><td>"We're not ready for a formal assessment."</td><td>Fear that surfacing gaps creates obligations they can't resource. The formal engagement feels like an audit, not help. In AI security specifically, there is a second layer: the client may not yet have a framework for evaluating what the assessment will find, whether the findings are manageable or severe, which makes formal exposure in this domain feel different from formal exposure in domains they know well.</td><td>"Most security leaders find that formal engagement creates obligations before it creates clarity. The prioritization conversation flips that: no deliverable that has to go anywhere."</td></tr>
      <tr><td>"The board keeps asking about this."</td><td>Three possible things: they lack a defensible prioritization narrative, leadership is asking faster than the org can answer, or the executive team senses exposure without visibility. Often the CISO has information but not yet a framework for interpreting it with confidence. The gap between the board's questions and the answers available is not always a data problem. It is sometimes an interpretive one.</td><td>Do not offer to build slides. Offer to help them build an operating narrative. That is what they actually need.</td></tr>
      <tr><td>"We just bought [tool]."</td><td>The vendor's definition of the problem was solved. Not necessarily the organization's actual exposure. The purchase is also a decision marker. It signals that the organization took action and made a call. In a domain where decision confidence is low, a visible purchase is evidence of engagement. Questioning the tool's coverage questions the competence of the purchase decision.</td><td>"What problem were you solving when you started that evaluation? Which of the three deployment patterns does it cover?"</td></tr>
      <tr><td>"Budget is tight right now."</td><td>Real, but often not the primary constraint. Usually paired with fear of exposure or ownership ambiguity. Budget resistance in AI security can also be protection against committing to a scope the executive cannot fully evaluate. In a domain where you cannot calibrate the findings before they arrive, approving budget means approving exposure you cannot oversee.</td><td>"That's honest. The most useful thing we can do right now is help you sequence. When budget moves, you know exactly where it goes first."</td></tr>
    </table>
    <div class="callout callout-amber"><strong>Executives are 43% more likely to commit a DLP violation than technology roles.</strong> The executives setting the policy are often the ones most likely to bypass it. AI governance programs have the same problem. Security programs built around assumed risk profiles miss the actual risk concentration. <span class="footnote">Fable Security Q1 2026 Human Risk Report</span></div>
    <div class="callout callout-muted"><strong>Pacing note.</strong> In a domain where client expertise has not yet fully transferred, trying to cover too much ground in a single meeting creates overload rather than urgency. The goal of the first conversation is one clear insight the client leaves with, not a complete diagnostic. A client who leaves a meeting having identified one gap they did not have language for before is more likely to re-engage than a client who leaves having been shown seven gaps they cannot yet evaluate.</div>`,

  credible_arc:`
    <h2>The five-move arc</h2>
    <p>Memorize the moves, not the words. The rep who has been here before does not sound scripted. They sound settled. In an undefined category like AI security, credibility comes from demonstrating that you understand the client's specific situation more accurately than they can describe it themselves. The arc is how you do that.</p>
    <div class="arc">
      <div class="arc-row"><div class="arc-step">1</div><div class="arc-body"><div class="arc-title">Read the room before you walk in</div><div class="arc-sub">Know the persona. Know the stage. The talk track is different for a CISO managing agents versus a GRC lead facing an audit cycle. Opening with the wrong frame signals that you came with a prepared answer, not a diagnostic posture. Clients who sense a prepared answer stop giving honest ones. Use the Conversation Builder before every first meeting. Do not wing the opening.</div></div></div>
      <div class="arc-row"><div class="arc-step">2</div><div class="arc-body"><div class="arc-title">Open with a peer observation, not a pitch</div><div class="arc-sub">A peer observation works because it creates asymmetric information value. You have cross-organizational pattern data the client cannot access from inside their own organization. That asymmetry positions you as worth listening to before any product has been mentioned. The client is not being asked to evaluate anything. They are receiving a piece of information. Those are psychologically different interactions, and the difference is what keeps sales resistance from activating. Use the rep voice: "The conversation that keeps coming up is..." Watch what the client does with it. That response is your roadmap for everything that follows.</div></div></div>
      <div class="arc-row"><div class="arc-step">3</div><div class="arc-body"><div class="arc-title">Four words: "Where does that land?"</div><div class="arc-sub">Then stop. Vendors fill silence because silence feels like losing control. When you hold the pause, the client interprets it as confidence, as someone who is not anxious about what they are about to hear. That interpretation produces a quiet reclassification: advisor rather than vendor. Advisors ask and wait. Vendors ask and redirect. The pause is the behavioral signal that produces the reclassification. The first time you fill it, you undo it. The client is connecting the observation to their own situation. Let them finish that work before you say anything.</div></div></div>
      <div class="arc-row"><div class="arc-step">4</div><div class="arc-body"><div class="arc-title">Surface the constraint underneath</div><div class="arc-sub">The constraint that stops movement is almost never the one named. Each real constraint produces a distinct behavioral signal. Fear of exposing gaps: avoidance language. "We're not ready." "Let's revisit in Q3." Political fragmentation: deflection to process. "We'd need more stakeholders aligned." Ownership ambiguity: confusion about who decides. "I'd need to check with..." Read the signal, name the constraint, then stop. "It sounds like the harder part here is less about [named issue] and more about [underlying constraint]. Is that right?" The goal is accurate naming, not overcoming. A client who confirms what is actually in the way can move when the constraint is addressed. A client who has not confirmed it cannot.</div></div></div>
      <div class="arc-row"><div class="arc-step">5</div><div class="arc-body"><div class="arc-title">Offer a specific, low-friction next step</div><div class="arc-sub">"A 90-minute prioritization working session, not an assessment. No formal deliverable that has to go anywhere. We come out of it with a clear view of what you would move on first and what can wait. The output stays with you." Then: "Would that be worth 90 minutes in the next few weeks?" Every element reduces a specific perceived risk: bounded time, no formal findings, no institutional obligation, client retains the output. Specificity does not create urgency. It reduces perceived risk. A vague offer produces a vague response.</div></div></div>
    </div>
    <div class="callout callout-teal"><strong>The rep who walks in with the right question beats the vendor who walks in with the right answer. Every time.</strong></div>`,

  credible_obs:`
    <h2>Opening observations that work</h2>
    <p>Pick one based on the trigger that got you in the room. Say it, then ask Move 3. Do not use more than one in a single meeting.</p>
    <div class="card">
      <div class="card-h"><span class="card-n">OB1</span><span class="card-l">Shadow AI and data exposure</span></div>
      <div class="card-b"><div class="q-box">"The organizations with the strongest data governance programs are the most surprised. They built the right controls for a world where data moves through known channels. AI created a channel that sits underneath all of them."</div><div class="callout callout-muted">Use when: employees are known to be using AI tools, or the trigger is data exposure risk. Anchor: CISA director incident, August 2025.</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">OB2</span><span class="card-l">Authorized failure</span></div>
      <div class="card-b"><div class="q-box">"The conversation that keeps coming up is authorized failure: not a breach, not an external attacker, but an autonomous system that did exactly what it was set up to do and produced an outcome nobody intended. Valid identity, authorized access, wrong outcome."</div><div class="callout callout-muted">Use when: agents are in production or pilot. Anchor: CrowdStrike / Fortune 50, RSAC 2026.</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">OB3</span><span class="card-l">Board accountability gap</span></div>
      <div class="card-b"><div class="q-box">"Most security leaders have the same challenge right now: the board is asking questions faster than the organization can produce defensible answers. Not because they are behind. Nobody has built the operating model yet."</div><div class="callout callout-muted">Use when: the trigger is board pressure or executive visibility. Anchor: Gartner top cybersecurity trend 2026.</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">OB4</span><span class="card-l">Developer tools and supply chain</span></div>
      <div class="card-b"><div class="q-box">"The attack surface shifted from the package to the tool itself, and most AppSec programs were not built to inspect that layer. A properly configured coding agent still deleted a production database in nine seconds."</div><div class="callout callout-muted">Use when: developer AI tooling is in scope, or AppSec is in the room. Anchor: PocketOS April 2026 / SANDWORM_MODE Feb 2026.</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">OB5</span><span class="card-l">Embedded SaaS agents</span></div>
      <div class="card-b"><div class="q-box">"Most enterprises are managing the AI tools their employees chose. The harder conversation is about the AI that came bundled with the subscription, operating with admin-level access that nobody reviewed."</div><div class="callout callout-muted">Use when: SaaS vendor AI capabilities are appearing without review. Anchor: Canvas breach May 2026.</div></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">OB6</span><span class="card-l">The full spectrum: mixed rooms</span></div>
      <div class="card-b"><div class="q-box">"What I keep seeing is that the same organization can have mature DLP, strong AppSec, and sophisticated IAM, and still have no governance over agents running in their SaaS environment. Each team thinks someone else owns the gap."</div><div class="callout callout-muted">Use when: multiple personas are present or the situation is unclear. Let each person in the room locate themselves in it.</div></div>
    </div>`,

  credible_diag:`
    <h2>Diagnostic questions: pick two, let them finish</h2>
    <p>Do not ask all of them. Pick two that fit the stage. Let the client finish before moving to the next one. When a client identifies a gap they did not know they had, do not offer the solution. Ask what they think the consequence is. Let them arrive at the urgency.</p>
    <div class="div"></div>
    <h3>Stage 1: General AI adoption</h3>
    <div class="q-box">Do you know which AI tools your employees are using and what data is entering those tools on a typical day?</div>
    <div class="q-box">Where does AI usage appear in your current DLP or DSPM monitoring, and where does it disappear from view?</div>
    <div class="q-box">What is your acceptable-use boundary for AI tools, and how do you know when it has been crossed?</div>
    <div class="div"></div>
    <h3>Stage 2: AI-native engineering</h3>
    <div class="q-box">What do your AI coding tools have access to in your environment: codebases, API keys, configuration files, production systems?</div>
    <div class="q-box">Has your supply chain review been updated to inspect AI tool plugins, MCP servers, and skills marketplace extensions?</div>
    <div class="q-box">AI coding-assisted commits leak secrets at twice the human baseline rate. How does your current secrets detection cover AI-generated code specifically?</div>
    <div class="div"></div>
    <h3>Stage 3: Agentic AI</h3>
    <div class="q-box">Can your SIEM distinguish an action taken by a human from an action taken by an agent in the last 24 hours?</div>
    <div class="q-box">When an agent makes a decision with business consequences, who is the accountable human owner, and is that documented?</div>
    <div class="q-box">What is your process if an autonomous agent begins operating outside its intended parameters?</div>
    <div class="div"></div>
    <h3>The six executive frames: read what's underneath</h3>
    <table class="fear-table">
      <tr><th>When they say</th><th>What's underneath</th></tr>
      <tr><td>"Who owns AI risk?"</td><td>Organizational fragmentation signal. If they can't answer quickly, maturity is lower than they think. If three people answer with three different answers, that is your finding.</td></tr>
      <tr><td>"What do we say to the board?"</td><td>Not a request for slides. Three possible signals: no defensible prioritization narrative, leadership asking faster than the org can answer, or the executive team senses exposure without visibility.</td></tr>
      <tr><td>"Can we prove where AI is being used?"</td><td>Rock 1 problem: inventory and discovery. Policy without provability is governance theater.</td></tr>
      <tr><td>"What happens when AI uses regulated data?"</td><td>Data classification, entitlement quality, lineage assumptions. Most AI governance is built on top of identity and data architectures that were already partially broken.</td></tr>
      <tr><td>"How do we govern vendor-embedded AI?"</td><td>SaaS vendors are adding agents faster than risk teams can review. Approved tools acquired before agents were embedded are not the same tools today.</td></tr>
      <tr><td>"What is our acceptable-use boundary?"</td><td>Strong signal for GRC and legal. Most have a policy. Very few have enforcement or exception processes. The audit gap.</td></tr>
    </table>`,

  credible_avoid:`
    <h2>What to avoid: by persona</h2>
    <div class="card">
      <div class="card-h"><span class="card-n">--</span><span class="card-l">CISO / Security Executive</span></div>
      <div class="card-b">
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not lead with vendors. They have heard from five this week, and each one opened with a vendor story, which is exactly what makes this one feel like the rest</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not over-index on agentic AI if they are still at Stage 1. Leading with the most advanced problem signals you read the stage wrong, which undermines everything that follows</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not imply they are behind. The framing that works is structural (the category moved faster than any governance program could follow) not personal (you have not kept up)</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not fill the silence after Move 3. It feels like courtesy to fill it, but the client filling it is the entire point; filling it yourself removes the thing you were waiting for</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">--</span><span class="card-l">CIO / IT Executive</span></div>
      <div class="card-b">
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not turn this into a security lecture. The CIO is accountable for delivery velocity, and a conversation that positions security as the thing that slows AI down will produce resistance before you have made a single substantive point</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not use CISO-level jargon. Attack vectors and threat surfaces are the CISO's vocabulary; the CIO's vocabulary is operational continuity, delivery cadence, and what happens when AI programs stall</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not skip the business continuity angle. Frame security as what keeps AI programs moving, because that is the frame that makes governance feel like an accelerant rather than a brake</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">--</span><span class="card-l">GRC / Legal / Privacy</span></div>
      <div class="card-b">
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not lead with threat scenarios. The GRC leader's domain is evidence, frameworks, and audit readiness; leading with threat scenarios makes the conversation feel like it belongs to someone else's meeting</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not turn this into a compliance crib sheet. They know the frameworks; what they do not yet have is the architecture for producing continuous evidence of AI controls, which is the specific gap that earns the conversation</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not assume they own the technical implementation. GRC leaders can mandate documentation but cannot mandate engineering behavior; the ownership ambiguity question is their problem too, not their tool</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">--</span><span class="card-l">Board / Executive Sponsor</span></div>
      <div class="card-b">
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not use technical jargon. The board's question is always about accountability and liability, not architecture; jargon signals this is a technical briefing, which removes the conversation from the level where they can actually contribute</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not bring a vendor list. Vendors are a purchasing decision; the board conversation is a governance conversation; arriving with vendors signals you misread the room before you walked in</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not treat this as a product meeting. It is an accountability conversation; the board member who leaves asking "when something goes wrong, who is accountable?" has had the right meeting regardless of what was presented</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Three questions maximum. Let them ask for more; the rep who asks five questions has made the meeting about their agenda; the rep who asks two and stops has made the meeting about the board's concerns</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">--</span><span class="card-l">AppSec / Engineering</span></div>
      <div class="card-b">
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not oversimplify. They will notice, and a rep who oversimplifies a technical domain to a technical audience loses credibility that does not come back in the same meeting</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not lead with governance before showing the technical gap. AppSec leaders disengage from governance conversations until the technical case is established; the supply chain attack surface is the technical case, and it lands before the governance argument</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not skip the supply chain conversation. SANDWORM_MODE and LiteLLM are Mandiant-confirmed cases, which means the supply chain threat for AI tooling is IR-verified, not theoretical, and AppSec audiences respond differently to verified IR than to analyst projections</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-n">--</span><span class="card-l">Mixed rooms</span></div>
      <div class="card-b">
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not tune your language to one persona and lose the others. The CISO and the CIO in the same room have different primary concerns; language that is precisely right for one will feel like it excludes the other</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Do not let a technical question drag the room into the weeds. A detailed technical exchange with one person loses everyone else, and the person you lost is usually the one with the most authority over the next step</span></div>
        <div class="avoid-row"><div class="avoid-dot"></div><span>Use one observation and let each persona locate themselves in it. A well-chosen observation allows the CISO to hear a security problem, the CIO to hear an operational risk, and the GRC lead to hear a compliance gap, all in the same sentence</span></div>
      </div>
    </div>`,
